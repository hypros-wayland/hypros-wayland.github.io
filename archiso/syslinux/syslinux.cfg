# PlasmaTV Linux BIOS boot menu.
#
# Note for whoever's reading this: the actual BIOS-mode bootloader here is
# syslinux, not GRUB (GRUB is only used by the target-system install, and
# there's an unused grub/ dir in this profile archiso ships by default for
# an alternate boot mode we don't use). Syslinux's TIMEOUT semantics are
# the opposite of GRUB's (TIMEOUT 0 in syslinux means "wait forever", not
# "boot instantly") so the closest equivalent to GRUB_TIMEOUT=0 is a
# minimal timeout (1 = 0.1s) with the menu skipped straight to the
# default entry — effectively instant, single-entry boot.
UI vesamenu.c32
MENU TITLE PlasmaTV Linux
MENU BACKGROUND splash.png

MENU WIDTH 78
MENU MARGIN 4
MENU ROWS 7
MENU VSHIFT 10
MENU TABMSGROW 14
MENU CMDLINEROW 14
MENU HELPMSGROW 16
MENU HELPMSGENDROW 29

MENU COLOR border       30;44   #40ffffff #a0000000 std
MENU COLOR title        1;36;44 #9033ccff #a0000000 std
MENU COLOR sel          7;37;40 #e0ffffff #20ffffff all
MENU COLOR unsel        37;44   #50ffffff #a0000000 std
MENU COLOR help         37;40   #c0ffffff #a0000000 std
MENU COLOR timeout_msg  37;40   #80ffffff #00000000 std
MENU COLOR timeout      1;37;40 #c0ffffff #00000000 std
MENU COLOR msg07        37;40   #90ffffff #a0000000 std
MENU COLOR tabmsg       31;40   #30ffffff #00000000 std

MENU CLEAR
MENU IMMEDIATE

DEFAULT system0
TIMEOUT 1

LABEL system0
MENU LABEL System0
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash
